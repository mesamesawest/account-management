<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Enterprise Renewal Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1916;
    --text-secondary: #6b6860;
    --accent: #2d5a27;
    --accent-light: #eaf3de;
    --warn: #7a3e00;
    --warn-light: #faeeda;
    --danger: #7a1f1f;
    --danger-light: #fcebeb;
    --neutral: #4a4740;
    --neutral-light: #f0ede8;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: var(--text);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .header-right {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    opacity: 0.5;
  }

  /* LAYOUT */
  .container { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 20px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }
  .stat-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* FILTERS */
  .filters-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filters-bar label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 4px;
  }
  .filters-bar select {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  .filters-bar select:focus { border-color: var(--accent); }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-divider { width: 1px; height: 24px; background: var(--border); }
  .filters-bar input[type="date"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  .filters-bar input[type="date"]:focus { border-color: var(--accent); }
  .results-count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }
  .chart-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; }

  /* TABLE */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .table-header-row {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }
  tbody td {
    padding: 11px 16px;
    font-size: 13px;
    white-space: nowrap;
  }
  td.name-cell { font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
  td.name-cell a { color: var(--text); text-decoration: none; }
  td.name-cell a:hover { text-decoration: underline; }
  td.mono { font-family: 'DM Mono', monospace; font-size: 12px; }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-green { background: var(--accent-light); color: var(--accent); }
  .badge-red { background: var(--danger-light); color: var(--danger); }
  .badge-orange { background: var(--warn-light); color: var(--warn); }
  .badge-gray { background: var(--neutral-light); color: var(--neutral); }

  /* LOADING / ERROR */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .container { padding: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>2026 Enterprise Renewal Dashboard</h1>
  <span class="header-right" id="last-updated">Loading…</span>
</div>

<div class="container">

  <!-- STAT CARDS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Accounts</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total ACV</div>
      <div class="stat-value" id="stat-acv">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Confirmed</div>
      <div class="stat-value" id="stat-confirmed">—</div>
      <div class="stat-sub" id="stat-confirmed-acv"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Paid</div>
      <div class="stat-value" id="stat-paid">—</div>
      <div class="stat-sub" id="stat-paid-acv"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cancelling</div>
      <div class="stat-value" id="stat-cancel">—</div>
      <div class="stat-sub" id="stat-cancel-acv"></div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters-bar">
    <div class="filter-group">
      <label>From</label>
      <input type="date" id="filter-date-from">
    </div>
    <div class="filter-group">
      <label>To</label>
      <input type="date" id="filter-date-to">
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <label>Month</label>
      <select id="filter-month"><option value="all">All Months</option></select>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <label>Status</label>
      <select id="filter-status"><option value="all">All Statuses</option></select>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <label>Paid</label>
      <select id="filter-paid">
        <option value="all">All</option>
        <option value="paid">Paid</option>
        <option value="unpaid">Unpaid</option>
      </select>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <label>Invoice</label>
      <select id="filter-invoice">
        <option value="all">All</option>
        <option value="sent">Sent</option>
        <option value="not-sent">Not Sent</option>
      </select>
    </div>
    <div class="filter-divider"></div>
    <button id="clear-dates" onclick="clearDates()" style="font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text-secondary);cursor:pointer;">Clear Dates</button>
    <div class="results-count" id="results-count"></div>
  </div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Status Breakdown</div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="chart-status"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">ACV by Month</div>
      <div class="chart-wrap" style="height:200px">
        <canvas id="chart-monthly"></canvas>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-header-row">
      <span class="table-title">Accounts</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')">Account</th>
            <th onclick="sortBy('type')">Type</th>
            <th onclick="sortBy('renewal')">Renewal Date</th>
            <th onclick="sortBy('value')">ACV</th>
            <th onclick="sortBy('status')">Status</th>
            <th onclick="sortBy('paid')">Paid</th>
            <th onclick="sortBy('invoiceSent')">Invoice</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" class="state-msg"><span class="spinner"></span>Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRgKgMUcF1nbKqrrcXBvz4C2Qq0vlMugKm5u5_wYKa72uQLGBNAhHcGGhZH8nUsM7TPdCPVq1-vJ_vt/pub?gid=1408826736&single=true&output=csv";

// ── STATE ────────────────────────────────────────────────────────────────────
let allData = [];
let sortKey = 'renewal';
let sortDir = 1;
let statusChart, monthlyChart;

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmtMoney = n => "$" + Math.round(n).toLocaleString();
const parseACV = s => { if (!s) return 0; const n = parseFloat(String(s).replace(/[$,]/g, "")); return isNaN(n) ? 0 : n; };
const toISO = s => {
  if (!s) return "";
  const p = s.split("/");
  if (p.length === 3) return `${p[2]}-${p[0].padStart(2,"0")}-${p[1].padStart(2,"0")}`;
  return s;
};
const fmtDisplay = iso => {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[+m-1]} ${+d}`;
};
const monthLabel = iso => {
  if (!iso) return "";
  const [, m] = iso.split("-");
  return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+m-1];
};

function statusBadge(s) {
  if (!s) return `<span class="badge badge-gray">Unknown</span>`;
  if (s === "Confirmed Renewal") return `<span class="badge badge-green">${s}</span>`;
  if (s.toLowerCase().includes("cancell")) return `<span class="badge badge-red">${s}</span>`;
  return `<span class="badge badge-orange">${s}</span>`;
}

// ── LOAD DATA ─────────────────────────────────────────────────────────────────
function loadData() {
  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: ({ data }) => {
      allData = data
        .filter(r => r["Client Name"] && r["Renewal Date"])
        .map(r => ({
          name: r["Client Name"] || "",
          value: parseACV(r["2026 Renewal ACV"]),
          renewal: toISO(r["Renewal Date"]),
          status: r["Renewal Status (Detailed)"] || r["Renewal Status"] || "",
          paid: String(r["Paid"]).toUpperCase() === "TRUE",
          type: r["Client Type"] || "",
          invoiceSent: String(r["Invoice Sent"]).toLowerCase() === "yes",
          pipedrive: r["Pipedrive Link"] || r["Pipedrive"] || "",
        }));

      populateFilters();
      render();
      document.getElementById("last-updated").textContent = "Updated " + new Date().toLocaleTimeString();
    },
    error: () => {
      document.getElementById("table-body").innerHTML = `<tr><td colspan="7" class="state-msg">⚠️ Failed to load data. Check CSV URL or CORS settings.</td></tr>`;
    }
  });
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function populateFilters() {
  const months = [...new Set(allData.map(r => r.renewal.slice(0,7)).filter(Boolean))].sort();
  const mSel = document.getElementById("filter-month");
  months.forEach(m => {
    const [y, mo] = m.split("-");
    const label = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+mo-1] + " " + y;
    mSel.innerHTML += `<option value="${m}">${label}</option>`;
  });

  const statuses = [...new Set(allData.map(r => r.status).filter(Boolean))].sort();
  const sSel = document.getElementById("filter-status");
  statuses.forEach(s => { sSel.innerHTML += `<option value="${s}">${s}</option>`; });

  ["filter-month","filter-status","filter-paid","filter-invoice"].forEach(id => {
    document.getElementById(id).addEventListener("change", render);
  });
  document.getElementById("filter-date-from").addEventListener("change", render);
  document.getElementById("filter-date-to").addEventListener("change", render);
}

function clearDates() {
  document.getElementById("filter-date-from").value = "";
  document.getElementById("filter-date-to").value = "";
  render();
}

function getFiltered() {
  const month = document.getElementById("filter-month").value;
  const status = document.getElementById("filter-status").value;
  const paid = document.getElementById("filter-paid").value;
  const invoice = document.getElementById("filter-invoice").value;
  const dateFrom = document.getElementById("filter-date-from").value;
  const dateTo = document.getElementById("filter-date-to").value;

  return allData.filter(r => {
    if (month !== "all" && !r.renewal.startsWith(month)) return false;
    if (status !== "all" && r.status !== status) return false;
    if (paid === "paid" && !r.paid) return false;
    if (paid === "unpaid" && r.paid) return false;
    if (invoice === "sent" && !r.invoiceSent) return false;
    if (invoice === "not-sent" && r.invoiceSent) return false;
    if (dateFrom && r.renewal < dateFrom) return false;
    if (dateTo && r.renewal > dateTo) return false;
    return true;
  });
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const data = getFiltered();
  updateStats(data);
  updateTable(data);
  updateCharts(data);
  document.getElementById("results-count").textContent = `${data.length} account${data.length !== 1 ? "s" : ""}`;
}

function updateStats(data) {
  const totalACV = data.reduce((s, r) => s + r.value, 0);
  const confirmed = data.filter(r => r.status === "Confirmed Renewal");
  const paid = data.filter(r => r.paid);
  const cancel = data.filter(r => r.status.toLowerCase().includes("cancell"));

  document.getElementById("stat-total").textContent = data.length;
  document.getElementById("stat-acv").textContent = fmtMoney(totalACV);
  document.getElementById("stat-confirmed").textContent = confirmed.length;
  document.getElementById("stat-confirmed-acv").textContent = fmtMoney(confirmed.reduce((s,r) => s+r.value,0));
  document.getElementById("stat-paid").textContent = paid.length;
  document.getElementById("stat-paid-acv").textContent = fmtMoney(paid.reduce((s,r) => s+r.value,0));
  document.getElementById("stat-cancel").textContent = cancel.length;
  document.getElementById("stat-cancel-acv").textContent = fmtMoney(cancel.reduce((s,r) => s+r.value,0));
}

function updateTable(data) {
  const sorted = [...data].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === "boolean") av = av ? 1 : 0, bv = bv ? 1 : 0;
    if (typeof av === "string") return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  if (sorted.length === 0) {
    document.getElementById("table-body").innerHTML = `<tr><td colspan="7" class="state-msg">No accounts match current filters.</td></tr>`;
    return;
  }

  document.getElementById("table-body").innerHTML = sorted.map(r => `
    <tr>
      <td class="name-cell">${r.pipedrive ? `<a href="${r.pipedrive}" target="_blank">${r.name}</a>` : r.name}</td>
      <td style="color:var(--text-secondary);font-size:12px">${r.type}</td>
      <td class="mono">${fmtDisplay(r.renewal)}</td>
      <td class="mono">${fmtMoney(r.value)}</td>
      <td>${statusBadge(r.status)}</td>
      <td><span class="badge ${r.paid ? 'badge-green' : 'badge-orange'}">${r.paid ? "Paid" : "Unpaid"}</span></td>
      <td style="color:var(--text-secondary);font-size:12px">${r.invoiceSent ? "Sent" : "—"}</td>
    </tr>
  `).join("");
}

function updateCharts(data) {
  // Status pie
  const statusCounts = {};
  data.forEach(r => { statusCounts[r.status || "Unknown"] = (statusCounts[r.status || "Unknown"] || 0) + 1; });
  const statusColors = { "Confirmed Renewal": "#2d5a27", "Cancelling": "#7a1f1f" };
  const fallbackColors = ["#b08a4e","#6b6860","#4a7a60","#7a4a6b","#4a6b7a"];
  let fci = 0;

  const statusLabels = Object.keys(statusCounts);
  const statusVals = statusLabels.map(k => statusCounts[k]);
  const statusColArr = statusLabels.map(k => {
    if (statusColors[k]) return statusColors[k];
    const c = fallbackColors[fci % fallbackColors.length]; fci++;
    return c;
  });

  if (statusChart) statusChart.destroy();
  statusChart = new Chart(document.getElementById("chart-status"), {
    type: "doughnut",
    data: { labels: statusLabels, datasets: [{ data: statusVals, backgroundColor: statusColArr, borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: "right", labels: { font: { family: "DM Sans", size: 11 }, color: "#6b6860", boxWidth: 10, padding: 10 } }
      }
    }
  });

  // Monthly bar
  const monthlyACV = {};
  const monthOrder = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  data.forEach(r => { const m = monthLabel(r.renewal); if (m) monthlyACV[m] = (monthlyACV[m] || 0) + r.value; });
  const mLabels = monthOrder.filter(m => monthlyACV[m]);
  const mVals = mLabels.map(m => monthlyACV[m]);

  if (monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(document.getElementById("chart-monthly"), {
    type: "bar",
    data: {
      labels: mLabels,
      datasets: [{
        label: "ACV",
        data: mVals,
        backgroundColor: "#2d5a27",
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { family: "DM Mono", size: 11 }, color: "#6b6860" } },
        y: { grid: { color: "#e8e6e0" }, ticks: { font: { family: "DM Mono", size: 11 }, color: "#6b6860", callback: v => "$" + (v/1000).toFixed(0) + "k" } }
      }
    }
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
